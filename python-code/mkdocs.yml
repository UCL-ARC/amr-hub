site_name: "AMR Hub"
site_description: "Documentation website for AMR Hub ABM"
site_author: "UCL ARC"
copyright: "Copyright © 2025 UCL ARC"
repo_url: "https://github.com/UCL-ARC/amr-hub"
repo_name: "UCL-ARC/amr-hub"
edit_uri: edit/main/docs/

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn

theme:
  name: "material"
  features:
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  icon:
    repo: fontawesome/brands/github

nav:
  - Overview: index.md
  - The Toy Problem: toy_problem.md
  - Floorplan extraction: floorplan_extraction.md
  - API reference:
      - Overview: api/index.md
      - Agent: api/agent.md
      - Exceptions: api/exceptions.md
      - Space Input Reader: api/space_input_reader.md
      - Location: api/location.md
      - Building: api/building.md
      - Floor: api/floor.md
      - Room: api/room.md
      - Door: api/door.md
      - Wall: api/wall.md
      - Content: api/content.md
      - Mesa Wrapper: api/mesa_wrapper.md
      - Run Function: api/run.md
      - Simulation: api/simulation.md
      - Simulation Factory: api/simulation_factory.md
      - Task: api/task.md

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          inventories:
            - "https://docs.python.org/3/objects.inv"
          options:
            docstring_style: numpy
            show_submodules: true
          paths: [src]
  - include-markdown:
      opening_tag: "{!"
      closing_tag: "!}"

extra:
  social:
    - icon: fontawesome/brands/github
      link: "https://github.com/UCL-ARC"

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.snippets
  - pymdownx.tasklist
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid

watch:
  - docs/
